name: Runeforge Backfill Index

# Chạy THỦ CÔNG một lần để đồng bộ _runeforge_files.json
# với toàn bộ files đã tồn tại trên repo (kể cả trước khi có hệ thống JSON)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Không dùng sparse-checkout để lấy được cả script backfill
          sparse-checkout: |
            .github
            _runeforge_files.json
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Write Backfill Script
        env:
          BACKFILL_SCRIPT: ${{ secrets.BACKFILL_SCRIPT }}
        run: |
          python -c "import os; open('backfill_index.py', 'w', encoding='utf-8').write(os.environ['BACKFILL_SCRIPT'])"

      - name: Run Backfill
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python backfill_index.py

      - name: Push JSON Index
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config advice.updateSparsePath false
          git sparse-checkout add _runeforge_files.json
          git add _runeforge_files.json
          git commit -m "🔄 Backfill: Đồng bộ _runeforge_files.json với toàn bộ repo" || echo "No changes"
          git push origin main || echo "Push done."
